services:
  postgres:
    image: postgres:18.4
    container_name: devconnect-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: devconnect_users
      POSTGRES_USER: devconnect
      POSTGRES_PASSWORD: devconnect
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devconnect -d devconnect_users"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:9.16
    container_name: devconnect-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@devconnect.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-devconnect}
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  cassandra:
    image: cassandra:5.0.8
    container_name: devconnect-cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: devconnect-local
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 100M
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE CLUSTER'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  cassandra-web:
    image: ipushc/cassandra-web
    container_name: devconnect-cassandra-web
    ports:
      - "3001:8083"
    environment:
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: 9042
    depends_on:
      cassandra:
        condition: service_healthy
    restart: unless-stopped

  cassandra-init:
    image: cassandra:5.0.8
    container_name: devconnect-cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
      - |
        cqlsh cassandra 9042 -e "CREATE KEYSPACE IF NOT EXISTS devconnect_feed WITH replication = {'class': 'NetworkTopologyStrategy', 'datacenter1': 1};"
    restart: "no"

  redis:
    image: redis:7.4-alpine
    container_name: devconnect-redis
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lfu"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:4.1.2
    container_name: devconnect-kafka
    ports:
      - "9092:9092"
    environment:
      # apache/kafka uses KAFKA_* variables (not Bitnami's KAFKA_CFG_*).
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: devconnect-kafka-ui
    ports:
      - "8085:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: devconnect-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    image: devconnect/discovery-server:local
    container_name: devconnect-discovery-server
    init: true
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8761'"]
      interval: 10s
      timeout: 3s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    image: devconnect/user-service:local
    container_name: devconnect-user-service
    init: true
    expose:
      - "8081"
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/devconnect_users
      POSTGRES_USERNAME: devconnect
      POSTGRES_PASSWORD: devconnect
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      EUREKA_PREFER_IP_ADDRESS: "true"
      OPENAPI_SERVER_URL: http://localhost:8090
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8081'"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  feed-service:
    build:
      context: .
      dockerfile: feed-service/Dockerfile
    image: devconnect/feed-service:local
    container_name: devconnect-feed-service
    init: true
    expose:
      - "8082"
    depends_on:
      discovery-server:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
    environment:
      CASSANDRA_CONTACT_POINTS: cassandra:9042
      CASSANDRA_LOCAL_DATACENTER: datacenter1
      CASSANDRA_KEYSPACE: devconnect_feed
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_ENVIRONMENT: local
      CACHE_PAGE_TOKEN_SECRET: devconnect-local-page-token-secret
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      EUREKA_PREFER_IP_ADDRESS: "true"
      OPENAPI_SERVER_URL: http://localhost:8090
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8082'"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    stop_grace_period: 35s

  search-service:
    build:
      context: .
      dockerfile: search-service/Dockerfile
    image: devconnect/search-service:local
    container_name: devconnect-search-service
    init: true
    expose:
      - "8083"
    depends_on:
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      EUREKA_PREFER_IP_ADDRESS: "true"
      OPENAPI_SERVER_URL: http://localhost:8090
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8083'"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    image: devconnect/notification-service:local
    container_name: devconnect-notification-service
    init: true
    expose:
      - "8084"
    depends_on:
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      EUREKA_PREFER_IP_ADDRESS: "true"
      OPENAPI_SERVER_URL: http://localhost:8090
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8084'"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: devconnect/api-gateway:local
    container_name: devconnect-api-gateway
    init: true
    ports:
      - "8090:8090"
    environment:
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      GATEWAY_ALLOWED_ORIGIN: http://localhost:8090
    depends_on:
      discovery-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
      feed-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8090'"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres-data:
  cassandra-data:
  pgadmin-data:

networks:
  default:
    name: devconnect-network
    external: true
