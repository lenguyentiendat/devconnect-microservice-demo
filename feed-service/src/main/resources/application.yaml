server:
  port: ${FEED_SERVICE_PORT:8082}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: false

spring:
  application:
    name: feed-service

  cloud:
    openfeign:
      client:
        config:
          user-service:
            url: ${USER_SERVICE_BASE_URL:http://localhost:8081}
            connectTimeout: 5000
            readTimeout: 5000

  cassandra:
    contact-points: ${CASSANDRA_CONTACT_POINTS:localhost:9042}
    local-datacenter: ${CASSANDRA_LOCAL_DATACENTER:datacenter1}
    keyspace-name: ${CASSANDRA_KEYSPACE:devconnect_feed}
    schema-action: create-if-not-exists
    request:
      timeout: ${CASSANDRA_REQUEST_TIMEOUT:5s}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# Backward-compatible alias for older deployments that inject this property directly.
services:
  user-service:
    base-url: ${USER_SERVICE_BASE_URL:http://localhost:8081}

app:
  async:
    post:
      # Dedicated bounded pool for the blocking User Service call in create-post.
      core-pool-size: ${POST_ASYNC_CORE_POOL_SIZE:4}
      max-pool-size: ${POST_ASYNC_MAX_POOL_SIZE:16}
      queue-capacity: ${POST_ASYNC_QUEUE_CAPACITY:100}
      await-termination-seconds: ${POST_ASYNC_AWAIT_TERMINATION_SECONDS:30}
  kafka:
    topics:
      post-events: post-events
