spring:
  datasource:
    url: jdbc:h2:mem:devconnect_users;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

eureka:
  client:
    enabled: false

app:
  openapi:
    server-url: http://localhost:8090
