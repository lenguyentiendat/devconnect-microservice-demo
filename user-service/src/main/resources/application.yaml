server:
  port: ${USER_SERVICE_PORT:8081}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: false

spring:
  application:
    name: user-service

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/devconnect_users}
    username: ${POSTGRES_USERNAME:devconnect}
    password: ${POSTGRES_PASSWORD:devconnect}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    placeholders:
      emailGeneratedStorage: STORED
